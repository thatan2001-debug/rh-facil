services:
  - type: web
    name: rh-facil
    runtime: python
    buildCommand: "pip install -r requirements.txt && python utils/crear_plantilla_excel.py"
    startCommand: "streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true"
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
